<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Website 1</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Fashion Store</h1>
    </header>

    <section class="products">

        <div class="card">
            <img src="images/shoes.jpg" alt="Shoes">

            <h2>Shoes</h2>

            <p>Price: ₹1999</p>

            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="images/watch.jpg" alt="Watch">

            <h2>Watch</h2>

            <p>Price: ₹2999</p>

            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="images/tshirt.jpg" alt="T-Shirt">

            <h2>T-Shirt</h2>

            <p>Price: ₹999</p>

            <button>Buy Now</button>
        </div>

    </section>

</body>
</html>
